services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.backend
    container_name: jeff_ia_backend
    ports:
      - "8001:8000"
    env_file:
      - backend/.env
    environment:
      POSTGRES_URI: ${POSTGRES_URI:-postgresql://jeff_ia:jeff_ia@jeff_ia_postgres:5432/jeff_ia}
      REDIS_URI: ${REDIS_URI:-redis://jeff_ia_redis:6379/0}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY}
      LANGCHAIN_TRACING_V2: true
      LANGSMITH_PROJECT: jeff_ai_project
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-minimax-m2.7:cloud}
      JEFF_AI_TZ: ${JEFF_AI_TZ:-UTC}
      # Repos de terceiros liberados para install_external_skill (além dos defaults
      # oficiais). Lista separada por vírgula. Liberado por decisão humana (REQ-007).
      SKILLS_ALLOWLIST: ${SKILLS_ALLOWLIST:-usenotra/skills}
      LANGGRAPH_STORE: '{"type": "postgres", "url": "$${env:POSTGRES_URI}", "index": {"embed": "./src/models/ollama_embeddings.py:embed_texts", "dims": 1024, "fields": ["content"]}}'
      LANGGRAPH_CHECKPOINTER: '{"type": "postgres", "url": "$${env:POSTGRES_URI}"}'
      # Espelha a seção "http" do langgraph.json: a imagem langchain/langgraph-api
      # não lê langgraph.json em runtime, só as env vars LANGGRAPH_*. Sem esta var,
      # HTTP_CONFIG fica None e o app customizado (webapp.py: /public/login,
      # /public/logout, rotas de imagens/documentos) nunca é montado (achado
      # empírico 2026-07-16, change autenticacao-jwt-rotas-protegidas).
      LANGGRAPH_HTTP: '{"app": "./src/infrastructure/web/webapp.py:app", "cors": {"allow_origins": ["${FRONTEND_ORIGIN:-http://localhost:3000}"], "allow_credentials": true, "allow_methods": ["*"], "allow_headers": ["*"]}}'
      # LANGSERVE_CORS_ALLOW_ORIGINS/LANGSERVE_CORS_ALLOW_CREDENTIALS não são lidas
      # por `langgraph_api` (nenhum env var com esse prefixo existe para cors no
      # pacote instalado, achado empírico 2026-07-16) — eram config morta desde
      # sempre, e o servidor caía no default allow_origins="*" com
      # allow_credentials=True hardcoded. A variável real é `CORS_ALLOW_ORIGINS`
      # (sem prefixo, lista separada por vírgula); `allow_credentials=True` já é
      # hardcoded no fallback do servidor quando CORS_CONFIG não está setado.
      CORS_ALLOW_ORIGINS: ${FRONTEND_ORIGIN:-http://localhost:3000}
    depends_on:
      jeff_ia_postgres:
        condition: service_healthy
      jeff_ia_redis:
        condition: service_started
    volumes:
      - ./backend/outputs:/deps/backend/outputs
      - ./backend/langgraph.json:/deps/backend/langgraph.json
      # Persiste skills criadas/instaladas pelo assistant em runtime.
      - ./backend/skills:/deps/backend/skills
      # [DEV/teste] monta o código-fonte do host para testar mudanças sem rebuild da imagem.
      - ./backend/src:/deps/backend/src
      # Persiste tools Python geradas (staging) + approved.json para revisão humana no host.
      - ./backend/src/tools/generated:/deps/backend/src/tools/generated
    networks:
      - jeff_ia-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile.frontend
    container_name: jeff_ia_frontend
    ports:
      - "3000:3000"
    environment:
      LANGSERVE_URL: http://localhost:8001
    depends_on:
      - backend
      - image-server
    networks:
      - jeff_ia-network

  image-server:
    image: python:3.11-slim
    container_name: jeff_ia_image_server
    ports:
      - "8080:8080"
    volumes:
      # Leitura/escrita: além de servir imagens, recebe uploads de referência.
      - ./backend/outputs:/deps/backend/outputs
      - ./backend/image_server.py:/app/image_server.py:ro
      # `src` é montado para o servidor importar a lógica de validação de upload.
      - ./backend/src:/app/src:ro
    working_dir: /app
    # Pacotes adicionados: `langchain-core` e `langchain-mcp-adapters` são
    # necessários desde a change `unified-agent-realignment` — o `mcp_admin_api`
    # (montado em `image_server.py:8080`) importa `mcp_client.py` que importa
    # `langchain_core.tools` e `langchain_mcp_adapters`. Sem isso, o container
    # quebra logo no boot.
    command:
      - sh
      - -c
      - "pip install --no-cache-dir fastapi uvicorn python-multipart langchain-core langchain-mcp-adapters && python image_server.py"
    networks:
      - jeff_ia-network

  jeff_ia_postgres:
    image: pgvector/pgvector:pg15
    container_name: jeff_ia_postgres
    environment:
      POSTGRES_DB: jeff_ia
      POSTGRES_USER: jeff_ia
      POSTGRES_PASSWORD: jeff_ia
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jeff_ia -d jeff_ia"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jeff_ia-network
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB

  jeff_ia_redis:
    image: redis:7-alpine
    container_name: jeff_ia_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - jeff_ia-network

  jeff_ia_pgadmin:
    image: dpage/pgadmin4:8
    container_name: jeff_ia_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      jeff_ia_postgres:
        condition: service_healthy
    networks:
      - jeff_ia-network
    profiles:
      - admin

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  jeff_ia-network:
    driver: bridge
