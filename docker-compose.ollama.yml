services:
  ollama:
    image: ollama/ollama:latest
    container_name: jeff_ia_ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    networks:
      - jeff_ia-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/version"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.backend
    container_name: jeff_ia_backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      POSTGRES_URI: postgresql://jeff_ia:jeff_ia@jeff_ia_postgres:5432/jeff_ia
      REDIS_URI: redis://:${REDIS_PASSWORD}@jeff_ia_redis:6379/0
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY}
      LANGCHAIN_TRACING_V2: true
      LANGSMITH_PROJECT: jeff_ai_project
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://jeff_ia_ollama:11434}
      OLLAMA_MODEL: minimax-m2.7:cloud
      # O bloco `index` é o que liga a busca semântica (pgvector). Sem ele,
      # `search_memory` degrada SILENCIOSAMENTE — sem erro, sem embeddings.
      # Mantido idêntico ao docker-compose.yml e ao Dockerfile.backend.
      LANGGRAPH_STORE: '{"type": "postgres", "url": "$${env:POSTGRES_URI}", "index": {"embed": "./src/models/ollama_embeddings.py:embed_texts", "dims": 1024, "fields": ["content"]}}'
      LANGGRAPH_CHECKPOINTER: '{"type": "postgres", "url": "$${env:POSTGRES_URI}"}'
      LANGSERVE_CORS_ALLOW_ORIGINS: '*'
      LANGSERVE_CORS_ALLOW_CREDENTIALS: 'true'
    depends_on:
      jeff_ia_postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./backend/outputs:/deps/backend/outputs
      - ./backend/langgraph.json:/deps/backend/langgraph.json
    networks:
      - jeff_ia-network

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile.frontend
    container_name: jeff_ia_frontend
    ports:
      - "3000:3000"
    environment:
      LANGSERVE_URL: http://backend:8000
      # Origem fixa do backend consumida pelo browser — ver docker-compose.yml
      # para a nota completa. Usa a porta de host (8000), não o hostname
      # interno `backend`, que só resolve dentro da rede docker.
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - jeff_ia-network

  jeff_ia_postgres:
    image: pgvector/pgvector:pg15
    container_name: jeff_ia_postgres
    environment:
      POSTGRES_DB: jeff_ia
      POSTGRES_USER: jeff_ia
      POSTGRES_PASSWORD: jeff_ia
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jeff_ia -d jeff_ia"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jeff_ia-network
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB

  jeff_ia_redis:
    image: redis:7-alpine
    container_name: jeff_ia_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - jeff_ia-network

  jeff_ia_pgadmin:
    image: dpage/pgadmin4:8
    container_name: jeff_ia_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      jeff_ia_postgres:
        condition: service_healthy
    networks:
      - jeff_ia-network
    profiles:
      - admin

volumes:
  ollama_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  jeff_ia-network:
    driver: bridge